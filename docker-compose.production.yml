x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    logging: *default-logging
    environment:
      MONGO_AUTHENTICATION_ENABLED: ${MONGO_AUTHENTICATION_ENABLED:-false}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      MONGO_DATABASE: ${MONGO_DATABASE:-aeroassist_agencyos}
    volumes:
      - mongo_data:/data/db
      - ./deploy/hostinger/mongodb/init-application-user.sh:/docker-entrypoint-initdb.d/20-aeroassist-application-user.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ -n "$${MONGO_INITDB_ROOT_USERNAME:-}" ]; then
            mongosh --quiet --username "$$MONGO_INITDB_ROOT_USERNAME" --password "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand('ping').ok";
          else
            mongosh --quiet --eval "db.adminCommand('ping').ok";
          fi
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${AEROASSIST_ENV_FILE:-.env.production}
    environment:
      AEROASSIST_DB_MODE: mongo
      MONGO_INITDB_ROOT_USERNAME: ""
      MONGO_INITDB_ROOT_PASSWORD: ""
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      DOCUMENT_EXPORT_STORAGE_DIR: /var/lib/aeroassist/document_exports
    volumes:
      - document_exports:/var/lib/aeroassist/document_exports
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_APP_ENV: production
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
  document_exports:
