services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ${AEROASSIST_ENV_FILE:-.env.production}
    environment:
      AEROASSIST_DB_MODE: mongo
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017}
      DOCUMENT_EXPORT_STORAGE_DIR: /var/lib/aeroassist/document_exports
    volumes:
      - document_exports:/var/lib/aeroassist/document_exports
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_APP_ENV: production
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
  document_exports:
