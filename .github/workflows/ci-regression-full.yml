name: Full smoke regression

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1,3,5"

permissions:
  contents: read

concurrency:
  group: ci-regression-full
  cancel-in-progress: false

jobs:
  complete-inventory:
    name: Complete inventory with governed isolation
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: development
      AEROASSIST_DB_MODE: memory
      DEMO_AUTH_ENABLED: "true"
      SEED_ON_STARTUP: "true"
      SEED_ENDPOINT_ENABLED: "true"
      DOCUMENT_EXPORT_STORAGE_DIR: ${{ runner.temp }}/document-exports

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python3 -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run full pilot release validation orchestrator
        run: python3 backend/scripts/run_pilot_release_validation.py --profile full --output "${{ runner.temp }}/pilot-release-validation.json"

      - name: Upload sanitized full regression summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-smoke-regression-results
          path: ${{ runner.temp }}/pilot-release-validation.json
          if-no-files-found: error
          retention-days: 14
