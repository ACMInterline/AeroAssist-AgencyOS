name: Fast validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Compile, inventory, imports, and frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: development
      AEROASSIST_DB_MODE: memory
      DOCUMENT_EXPORT_STORAGE_DIR: ${{ runner.temp }}/document-exports
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python3 -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Check repository whitespace
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD

      - name: Compile backend Python
        run: python3 -m compileall -q backend

      - name: Validate build phase ordering
        run: cd backend && python3 -c "from build_phase import CURRENT_BUILD_PHASE, phase_is_at_least; assert phase_is_at_least(CURRENT_BUILD_PHASE, 'phase_56_5_8_final_stabilization_pilot_release_gate'); assert phase_is_at_least('phase_56_10_example', 'phase_56_9_example')"

      - name: Validate smoke inventory
        run: python3 backend/scripts/validate_smoke_inventory.py

      - name: Validate CI foundation
        run: python3 backend/scripts/validate_ci_foundation.py

      - name: Validate persistence query foundation
        run: python3 backend/scripts/validate_persistence_query_foundation.py

      - name: Validate observability foundation
        run: python3 backend/scripts/validate_observability_foundation.py

      - name: Validate final stabilization pilot release gate
        run: python3 backend/scripts/validate_final_stabilization_pilot_release_gate.py

      - name: Run persistence query foundation static smoke
        run: python3 backend/scripts/smoke_persistence_scalability_tenant_query_hardening_foundation.py --static

      - name: Run observability foundation static smoke
        run: python3 backend/scripts/smoke_observability_diagnostics_performance_telemetry_foundation.py --static

      - name: Run final stabilization release-gate static smoke
        run: python3 backend/scripts/smoke_final_stabilization_pilot_release_gate.py --static

      - name: Verify release assessment is blocked without production evidence
        run: |
          set +e
          python3 backend/scripts/assess_pilot_release_readiness.py --format json --output "${RUNNER_TEMP}/pilot-release-assessment.json" > /dev/null
          status=$?
          set -e
          test "$status" -eq 1
          python3 -c "import json, os, pathlib; data=json.loads(pathlib.Path(os.environ['RUNNER_TEMP']).joinpath('pilot-release-assessment.json').read_text()); assert data['assessment_status'] == 'blocked'; assert data['production_evidence_supplied'] is False; assert data['production_deployment_verified'] is False; assert data['pilot_release_ready'] is False"

      - name: Validate MongoDB backup shell safety
        run: |
          bash -n deploy/hostinger/mongodb/init-application-user.sh
          bash -n deploy/hostinger/scripts/backup_mongo.sh
          bash -n deploy/hostinger/scripts/verify_mongodb_backup.sh
          bash -n deploy/hostinger/scripts/restore_mongodb_backup.sh
          bash -n deploy/hostinger/scripts/test_restore_mongodb_backup.sh
          bash -n deploy/hostinger/scripts/prune_backups.sh

      - name: Run MongoDB security foundation static smoke
        run: python3 backend/scripts/smoke_mongodb_security_backup_disaster_recovery_foundation.py --static

      - name: Import production runtime modules
        run: cd backend && python3 -c "import smoke_inventory, server; print(server.app)"

      - name: Run static production readiness checks
        run: python3 backend/scripts/check_production_readiness.py

      - name: Build frontend
        run: npm run build --prefix frontend
