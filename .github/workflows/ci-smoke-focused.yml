name: Focused smoke validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-smoke-focused-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused-smokes:
    name: Inventory-selected critical smokes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_ENV: development
      AEROASSIST_DB_MODE: memory
      DEMO_AUTH_ENABLED: "true"
      SEED_ON_STARTUP: "true"
      SEED_ENDPOINT_ENABLED: "true"
      DOCUMENT_EXPORT_STORAGE_DIR: ${{ runner.temp }}/document-exports
      AEROASSIST_SMOKE_BASE_URL: http://127.0.0.1:18081
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python3 -m pip install -r backend/requirements.txt

      - name: Validate inventory and CI structure
        run: |
          python3 backend/scripts/validate_smoke_inventory.py
          python3 backend/scripts/validate_ci_foundation.py

      - name: Start disposable backend
        run: |
          mkdir -p "$DOCUMENT_EXPORT_STORAGE_DIR"
          cd backend
          python3 -m uvicorn server:app --host 127.0.0.1 --port 18081 > "${{ runner.temp }}/focused-backend.log" 2>&1 &
          echo "$!" > "${{ runner.temp }}/focused-backend.pid"

      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            if python3 -c "from urllib.request import urlopen; urlopen('$AEROASSIST_SMOKE_BASE_URL/api/health', timeout=3)"; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run static inventory tier
        run: python3 backend/scripts/run_smoke_inventory.py --ci-suitable-only --tier static --result-json "${{ runner.temp }}/static-smoke-results.json"

      - name: Run focused inventory tier
        run: python3 backend/scripts/run_smoke_inventory.py --ci-suitable-only --tier focused --result-json "${{ runner.temp }}/focused-smoke-results.json"

      - name: Upload safe failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: focused-smoke-diagnostics
          path: |
            ${{ runner.temp }}/static-smoke-results.json
            ${{ runner.temp }}/focused-smoke-results.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop disposable backend
        if: always()
        run: |
          if [[ -f "${{ runner.temp }}/focused-backend.pid" ]]; then
            pid="$(cat "${{ runner.temp }}/focused-backend.pid")"
            if kill -0 "$pid" 2>/dev/null; then
              kill "$pid"
            fi
          fi
